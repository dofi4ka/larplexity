services:
  bot:
    build: .
    container_name: larplexity-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    volumes:
      - bot-data:/app/data
      - bot-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bot-data:
  bot-uploads:
